function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function computeStandings(scores){
  const s={};
  Object.values(GROUPS).flat().forEach(t=>{s[t]={p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0};});
  GROUP_FIXTURES.forEach(fix=>{
    const sc=scores[fix.id];
    if(!sc||sc.home==null||sc.away==null||sc.home===""||sc.away==="")return;
    const hg=parseInt(sc.home),ag=parseInt(sc.away);
    if(isNaN(hg)||isNaN(ag))return;
    const h=s[fix.home],a=s[fix.away];
    h.p++;a.p++;h.gf+=hg;h.ga+=ag;h.gd+=hg-ag;a.gf+=ag;a.ga+=hg;a.gd+=ag-hg;
    if(hg>ag){h.w++;h.pts+=3;a.l++;}else if(hg<ag){a.w++;a.pts+=3;h.l++;}else{h.d++;a.d++;h.pts++;a.pts++;}
  });
  return s;
}

function getGroupRankings(standings){
  const r={};
  Object.entries(GROUPS).forEach(([g,teams])=>{
    r[g]=[...teams].sort((a,b)=>{
      const sa=standings[a],sb=standings[b];
      if(sb.pts!==sa.pts)return sb.pts-sa.pts;
      if(sb.gd!==sa.gd)return sb.gd-sa.gd;
      return sb.gf-sa.gf;
    });
  });
  return r;
}

function computePts(assignments,names,scores,ko){
  const standings=computeStandings(scores);
  const rankings=getGroupRankings(standings);
  const groupComplete={};
  Object.keys(GROUPS).forEach(g=>{
    groupComplete[g]=GROUP_FIXTURES.filter(f=>f.group===g).every(f=>{
      const sc=scores[f.id];
      return sc&&sc.home!=null&&sc.home!==""&&sc.away!=null&&sc.away!=="";
    });
  });
  const toppers=new Set(Object.entries(rankings).filter(([g])=>groupComplete[g]).map(([,r])=>r[0]));
  const pts={};
  names.forEach(name=>{
    const sq=assignments[name];if(!sq)return;
    const myTeams=[sq.elite.name,sq.contender.name,sq.underdog.name];
    let p=0;
    myTeams.forEach(team=>{
      GROUP_FIXTURES.forEach(fix=>{
        const sc=scores[fix.id];
        if(!sc||sc.home==null||sc.away==null||sc.home===""||sc.away==="")return;
        const hg=parseInt(sc.home),ag=parseInt(sc.away);
        if(isNaN(hg)||isNaN(ag))return;
        if(fix.home!==team&&fix.away!==team)return;
        const isHome=fix.home===team;
        const won=isHome?hg>ag:ag>hg;
        const scored=isHome?hg:ag;
        const opp=isHome?fix.away:fix.home;
        if(won)p+=PTS.groupWin;
        if(scored>=5)p+=PTS.fiveGoals;
        if(!ELITE_SET.has(team)&&ELITE_SET.has(opp)&&won)p+=PTS.underdogElite;
      });
      if(toppers.has(team))p+=PTS.groupTop;
      if(ko?.r32?.includes(team))p+=PTS.r32Win;
      if(ko?.r16?.includes(team))p+=PTS.r16Win;
      if(ko?.qf?.includes(team))p+=PTS.qfWin;
      if(ko?.sf?.includes(team))p+=PTS.sfWin;
      if(ko?.final?.includes(team))p+=PTS.finalWin;
      if(ko?.champion===team)p+=PTS.champion;
      if(ko?.goldenBoot===team)p+=PTS.goldenBoot;
    });
    pts[name]=p;
  });
  return pts;
}

function openPrint(assignments,names,cPts){
  const sorted=[...names].sort((a,b)=>(cPts[b]||0)-(cPts[a]||0));
  const M=["🥇","🥈","🥉"];
  const rows=names.map(n=>{const q=assignments[n];return`<tr><td class=n>${n}</td><td class=e>${q.elite.flag} ${q.elite.name}</td><td class=c>${q.contender.flag} ${q.contender.name}</td><td class=u>${q.underdog.flag} ${q.underdog.name}</td><td class=p>${cPts[n]||0}</td></tr>`;}).join("");
  const lr=sorted.map((n,i)=>{const q=assignments[n];return`<tr><td class=rk>${M[i]||i+1}</td><td class=n>${n}</td><td>${q.elite.flag} ${q.elite.name} · ${q.contender.flag} ${q.contender.name} · ${q.underdog.flag} ${q.underdog.name}</td><td class=p>${cPts[n]||0}</td></tr>`;}).join("");

tml>`;

// ── SCORE INPUT (manual) ──────────────────────────────────────────────────────
function ScoreInput({fixture,score,onChange}){
  const hg=score?.home!=null&&score?.home!==""?parseInt(score.home):null;
  const ag=score?.away!=null&&score?.away!==""?parseInt(score.away):null;
  const done=hg!==null&&ag!==null&&!isNaN(hg)&&!isNaN(ag);
  const res=done?(hg>ag?"home":hg<ag?"away":"draw"):null;
  return(
    <div style={{...card,display:"flex",alignItems:"center",gap:8,marginBottom:6,padding:"7px 11px",borderColor:done?"rgba(201,168,76,0.35)":"rgba(255,255,255,0.06)"}}>
      <span style={{fontSize:10,color:GOLD,minWidth:20,fontWeight:700}}>G{fixture.group}</span>
      <div style={{flex:1,display:"flex",alignItems:"center",gap:6,justifyContent:"flex-end"}}>
        <span style={{fontSize:11,color:res==="home"?"#f5d78e":"#888",fontWeight:res==="home"?700:400,textAlign:"right",minWidth:90,whiteSpace:"nowrap",overflow:"hidden"}}>{FLAGS[fixture.home]} {fixture.home}</span>
        <input type="number" min="0" max="99" value={score?.home??""} onChange={e=>onChange(fixture.id,"home",e.target.value)}
          style={{width:34,textAlign:"center",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(201,168,76,0.3)",borderRadius:5,color:"#f5d78e",fontFamily:"Georgia,serif",fontSize:15,fontWeight:700,padding:"3px 0",outline:"none"}}/>
        <span style={{color:"#444",fontWeight:700,fontSize:13}}>–</span>
        <input type="number" min="0" max="99" value={score?.away??""} onChange={e=>onChange(fixture.id,"away",e.target.value)}
          style={{width:34,textAlign:"center",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(201,168,76,0.3)",borderRadius:5,color:"#f5d78e",fontFamily:"Georgia,serif",fontSize:15,fontWeight:700,padding:"3px 0",outline:"none"}}/>
        <span style={{fontSize:11,color:res==="away"?"#f5d78e":"#888",fontWeight:res==="away"?700:400,minWidth:90,whiteSpace:"nowrap",overflow:"hidden"}}>{fixture.away} {FLAGS[fixture.away]}</span>
      </div>
      {done&&(hg+ag>=5)&&<span title="5+ goals bonus!">🎯</span>}
    </div>
  );
}

// ── KNOCKOUT LADDER ───────────────────────────────────────────────────────────
function KnockoutLadder({ko, setKo, standings, rankings, scores, drawn, assignments, names}){
  const ALL_NATIONS = Object.values(GROUPS).flat();

  // Which teams are in the sweepstake?
  const sweepTeams = drawn && assignments
    ? new Set(names.flatMap(n=>[assignments[n]?.elite?.name, assignments[n]?.contender?.name, assignments[n]?.underdog?.name].filter(Boolean)))
    : new Set();

  // Owners lookup
  const teamOwner = {};
  if(drawn && assignments){
    names.forEach(n=>{
      const sq=assignments[n];
      if(sq){
        [sq.elite,sq.contender,sq.underdog].forEach(t=>{ if(t) teamOwner[t.name]=n; });
      }
    });
  }

  const rounds = [
    {key:"r32", label:"Round of 32", pts:PTS.r32Win, cols:16},
    {key:"r16", label:"Round of 16", pts:PTS.r16Win, cols:8},
    {key:"qf",  label:"Quarter-Finals", pts:PTS.qfWin, cols:4},
    {key:"sf",  label:"Semi-Finals", pts:PTS.sfWin, cols:2},
    {key:"final", label:"Final", pts:PTS.finalWin, cols:2},
  ];

  const toggle=(round,team)=>{
    setKo(prev=>{
      const arr=prev[round]||[];
      return{...prev,[round]:arr.includes(team)?arr.filter(t=>t!==team):[...arr,team]};
    });
  };

  const TeamPill=({team,active,onClick,small})=>{
    const isSweep=sweepTeams.has(team);
    const owner=teamOwner[team];
    return(
      <button onClick={onClick} title={owner?`${team} — ${owner}'s team`:team} style={{
        padding:small?"3px 8px":"5px 11px",
        borderRadius:20,cursor:"pointer",fontFamily:"Georgia,serif",
        fontSize:small?10:11,
        background:active?"rgba(201,168,76,0.25)":"rgba(255,255,255,0.04)",
        border:`1px solid ${active?GOLD:isSweep?"rgba(201,168,76,0.3)":"rgba(255,255,255,0.1)"}`,
        color:active?"#f5d78e":isSweep?GOLD:"#777",
        fontWeight:active?700:400,
        display:"flex",alignItems:"center",gap:4,
      }}>
        {FLAGS[team]||""} {team}
        {isSweep&&<span style={{fontSize:8,color:active?"#f5d78e":GOLD}}>★</span>}
      </button>
    );
  };

  return(
    <div>
      <div style={{...secTitle,marginBottom:6}}>🏆 Knockout Bracket</div>
      <p style={{color:"#a89070",fontSize:13,marginBottom:20}}>
        Tick each team as they win their match. ★ = your sweepstake team. Points update live.
      </p>

      {rounds.map(({key,label,pts,cols})=>(
        <div key={key} style={{marginBottom:28}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
            <div style={{color:GOLD,fontSize:13,fontWeight:700}}>{label}</div>
            <div style={{color:"#555",fontSize:11}}>+{pts} pts per team</div>
            <div style={{color:"#95e17d",fontSize:11}}>{(ko[key]||[]).length} teams through</div>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {ALL_NATIONS.map(team=>{
              const active=(ko[key]||[]).includes(team);
              return <TeamPill key={team} team={team} active={active} onClick={()=>toggle(key,team)}/>;
            })}
          </div>
          {/* Show who's through in a highlighted strip */}
          {(ko[key]||[]).length>0&&(
            <div style={{marginTop:8,padding:"8px 12px",background:"rgba(201,168,76,0.06)",border:"1px solid rgba(201,168,76,0.2)",borderRadius:8}}>
              <span style={{color:"#888",fontSize:11,marginRight:8}}>Through:</span>
              {(ko[key]||[]).map(t=>(
                <span key={t} style={{fontSize:13,marginRight:6}} title={teamOwner[t]?`${t} — ${teamOwner[t]}`:""}>{FLAGS[t]} {t}{teamOwner[t]?` (${teamOwner[t]})`:""}  </span>
              ))}
            </div>
          )}
        </div>
      ))}

      {/* Champion */}
      <div style={{marginBottom:24}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
          <div style={{color:GOLD,fontSize:13,fontWeight:700}}>🥇 World Cup Champion</div>
          <div style={{color:"#555",fontSize:11}}>+{PTS.champion} pts</div>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {["none",...ALL_NATIONS].map(team=>{
            const val=team==="none"?"":team;
            const active=ko.champion===val;
            return(
              <button key={team} onClick={()=>setKo(p=>({...p,champion:val}))} style={{
                padding:"5px 11px",borderRadius:20,cursor:"pointer",fontFamily:"Georgia,serif",fontSize:11,
                background:active?"rgba(201,168,76,0.25)":"rgba(255,255,255,0.04)",
                border:`1px solid ${active?GOLD:"rgba(255,255,255,0.1)"}`,
                color:active?"#f5d78e":"#777",fontWeight:active?700:400,
              }}>
                {team==="none"?"— none yet —":`${FLAGS[team]||""} ${team}`}
              </button>
            );
          })}
        </div>
      </div>

      {/* Golden Boot */}
      <div style={{marginBottom:24}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
          <div style={{color:GOLD,fontSize:13,fontWeight:700}}>👟 Golden Boot (team of winner)</div>
          <div style={{color:"#555",fontSize:11}}>+{PTS.goldenBoot} pts</div>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {["none",...ALL_NATIONS].map(team=>{
            const val=team==="none"?"":team;
            const active=ko.goldenBoot===val;
            return(
              <button key={team} onClick={()=>setKo(p=>({...p,goldenBoot:val}))} style={{
                padding:"5px 11px",borderRadius:20,cursor:"pointer",fontFamily:"Georgia,serif",fontSize:11,
                background:active?"rgba(201,168,76,0.25)":"rgba(255,255,255,0.04)",
                border:`1px solid ${active?GOLD:"rgba(255,255,255,0.1)"}`,
                color:active?"#f5d78e":"#777",fontWeight:active?700:400,
              }}>
                {team==="none"?"— none yet —":`${FLAGS[team]||""} ${team}`}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]         = useState("squads");
  const [names,setNames]     = useState(PRESET_NAMES);
  const [assignments,setAssignments] = useState(PRESET_ASSIGNMENTS);
  const [drawn,setDrawn]     = useState(true);
  const [scores,setScores]   = useState({});
  const [ko,setKo]           = useState(emptyKo);
  const [overrides,setOverrides] = useState(emptyOverrides);
  const [activeGroup,setActiveGroup] = useState("A");
  const [confirmReset,setConfirmReset] = useState(false);
  const [manualMode,setManualMode] = useState(true);
  const [draft,setDraft]     = useState({});
  const [showExport,setShowExport] = useState(false);
  const [importText,setImportText] = useState("");
  const [importError,setImportError] = useState("");
  const [saved,setSaved]     = useState(false);
  const [fetching,setFetching] = useState(false);
  const [lastFetch,setLastFetch] = useState(null);
  const [fetchError,setFetchError] = useState(null);

  // Load on mount
  useEffect(()=>{
    const d=loadLocal();
    if(d){
      setNames(d.names||PRESET_NAMES);
      setAssignments(d.assignments||PRESET_ASSIGNMENTS);
      setDrawn(d.drawn!=null?d.drawn:true);
      setScores(d.scores||{});
      setKo(d.ko||emptyKo);
      setOverrides(d.overrides||emptyOverrides);
      if(d.lastFetch)setLastFetch(d.lastFetch);
      if(d.drawn!=null?d.drawn:true) setTab("squads");
    }
  },[]);

  // Persist
  const persist = useCallback((state)=>{
    saveLocal(state);
    setSaved(true);
    setTimeout(()=>setSaved(false),1400);
  },[]);

  useEffect(()=>{
    persist({names,assignments,drawn,scores,ko,overrides,lastFetch});
  },[names,assignments,drawn,scores,ko,overrides,lastFetch]);

  // ── AUTO-FETCH SCORES ──────────────────────────────────────────────────────
  const fetchScores = async()=>{
    setFetching(true);
    setFetchError(null);
    try{
      const res = await fetch(API_BASE, {
        headers:{"X-Auth-Token": API_TOKEN}
      });
      if(!res.ok) throw new Error(`API error ${res.status}`);
      const data = await res.json();
      const matches = data.matches || [];
      const newScores = {...scores};
      let updated = 0;
      matches.forEach(m=>{
        const stage = m.stage||"";
        if(!stage.includes("GROUP")) return; // only group stage for now
        const hn = normalise(m.homeTeam?.name||"");
        const an = normalise(m.awayTeam?.name||"");
        const ft = m.score?.fullTime;
        if(!ft||ft.home==null||ft.away==null) return;
        // Find matching fixture
        const fix = GROUP_FIXTURES.find(f=>(f.home===hn&&f.away===an)||(f.home===an&&f.away===hn));
        if(!fix) return;
        const flipped = fix.home!==hn;
        const hGoals = flipped?ft.away:ft.home;
        const aGoals = flipped?ft.home:ft.away;
        const existing = newScores[fix.id];
        if(!existing||String(existing.home)!==String(hGoals)||String(existing.away)!==String(aGoals)){
          newScores[fix.id]={home:String(hGoals),away:String(aGoals)};
          updated++;
        }
      });
      setScores(newScores);
      const ts = new Date().toLocaleTimeString("en-NZ",{hour:"2-digit",minute:"2-digit"});
      setLastFetch(ts);
      setFetchError(updated>0?`✓ Updated ${updated} score${updated!==1?"s":""}`:"✓ All scores up to date");
    }catch(e){
      setFetchError(`⚠️ ${e.message}`);
    }
    setFetching(false);
  };

  // Auto-fetch on load
  useEffect(()=>{ fetchScores(); },[]);

  const cPts = useMemo(()=>{
    if(!drawn||!assignments)return{};
    const base=computePts(assignments,names,scores,ko);
    const result={};
    names.forEach(name=>{
      result[name]=(base[name]||0)+(parseInt(overrides[name]?.pts)||0);
    });
    return result;
  },[drawn,assignments,names,scores,ko,overrides]);

  const standings = useMemo(()=>computeStandings(scores),[scores]);
  const rankings  = useMemo(()=>getGroupRankings(standings),[standings]);
  const sorted    = drawn?[...names].sort((a,b)=>(cPts[b]||0)-(cPts[a]||0)):[];
  const medal     = i=>["🥇","🥈","🥉"][i]||"";

  const handleScore=(id,side,val)=>setScores(p=>({...p,[id]:{...(p[id]||{}),[side]:val}}));
  const lockDraw=()=>{
    const allOk=names.every(n=>draft[n]?.elite&&draft[n]?.contender&&draft[n]?.underdog);
    if(!allOk){alert("Please assign all 3 teams for every player.");return;}
    setAssignments({...draft});setScores({});setKo(emptyKo);setOverrides(emptyOverrides);setDrawn(true);setConfirmReset(false);setTab("squads");
  };
  const randomDraw=()=>{
    const e=shuffle(ALL_TEAMS.elite),c=shuffle(ALL_TEAMS.contender),u=shuffle(ALL_TEAMS.underdog);
    const r={};names.forEach((n,i)=>{r[n]={elite:e[i],contender:c[i],underdog:u[i]};});
    setAssignments(r);setScores({});setKo(emptyKo);setOverrides(emptyOverrides);setDrawn(true);setConfirmReset(false);setTab("squads");
  };
  const setDraftTeam=(name,tier,teamName)=>{
    const obj=ALL_14.find(t=>t.name===teamName)||null;
    setDraft(p=>({...p,[name]:{...(p[name]||{}),[tier]:obj||undefined}}));
  };
  const usedIn=tier=>new Set(names.map(n=>draft[n]?.[tier]?.name).filter(Boolean));
  const doImport=()=>{
    try{
      const d=JSON.parse(importText);
      if(!d.names||!d.assignments)throw new Error("Invalid data");
      setNames(d.names);setAssignments(d.assignments);setDrawn(d.drawn||false);
      setScores(d.scores||{});setKo(d.ko||emptyKo);setOverrides(d.overrides||emptyOverrides);
      setShowExport(false);setImportText("");setImportError("");setTab("squads");
    }catch(e){setImportError("Invalid — paste the full exported text.");}
  };

  const tabs=[
    {id:"setup",    label:"⚙️ Setup"},
    {id:"squads",   label:"🎯 Squads",    disabled:!drawn},
    {id:"scores",   label:"⚽ Scores",    disabled:!drawn},
    {id:"knockout", label:"🏆 Knockout",  disabled:!drawn},
    {id:"overrides",label:"✏️ Overrides", disabled:!drawn},
    {id:"leaderboard",label:"📊 Leaderboard",disabled:!drawn},
    {id:"fixtures", label:"📅 Fixtures"},
  ];

  return(
    <div style={{minHeight:"100vh",background:bg,fontFamily:"Georgia,serif",color:"#f0e6d3"}}>

      {/* Header */}
      <div style={{background:"linear-gradient(90deg,#1a0a00,#2d1500,#1a0a00)",borderBottom:`2px solid ${GOLD}`,padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontSize:9,letterSpacing:4,color:GOLD,textTransform:"uppercase",marginBottom:2}}>FIFA World Cup 2026</div>
          <h1 style={{margin:0,fontSize:"clamp(17px,3.5vw,28px)",fontWeight:700,background:`linear-gradient(90deg,#f5d78e,${GOLD},#f5d78e)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
            Office Sweepstake 🏆
          </h1>
          <div style={{fontSize:10,color:"#7a6040",marginTop:2,display:"flex",alignItems:"center",gap:8}}>
            <span>14 players · 3 teams each</span>
            {saved&&<span style={{color:"#95e17d"}}>✓ saved</span>}
            {lastFetch&&<span style={{color:"#6a9fd4"}}>⟳ scores: {lastFetch}</span>}
          </div>

        <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>

                    {day.date}
                  </div>
                  {day.matches.map((m,mi)=>{
                    const gf=GROUP_FIXTURES.find(f=>(f.home===m.home&&f.away===m.away)||(f.home===m.away&&f.away===m.home));
                    const flipped=gf&&gf.home!==m.home;
                    const rawSc=gf?scores[gf.id]:null;
                    const sc=rawSc&&flipped?{home:rawSc.away,away:rawSc.home}:rawSc;
                    const hg=sc?.home!=null&&sc?.home!==""?parseInt(sc.home):null;
                    const ag=sc?.away!=null&&sc?.away!==""?parseInt(sc.away):null;
                    const played=hg!==null&&ag!==null&&!isNaN(hg)&&!isNaN(ag);
                    const involved=drawn&&assignments?names.some(n=>{
                      const sq=assignments[n];
                      return sq&&[sq.elite.name,sq.contender.name,sq.underdog.name].some(t=>t===m.home||t===m.away);
                    }):false;
                    const isKo=["R32","R16","QF","SF","3P","FIN","—"].includes(m.group);
                    return(
                      <div key={mi} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderRadius:7,marginBottom:2,background:involved?"rgba(201,168,76,0.06)":"rgba(255,255,255,0.02)",border:`1px solid ${involved?"rgba(201,168,76,0.2)":"rgba(255,255,255,0.04)"}`}}>
                        <span style={{fontSize:11,color:GOLD,minWidth:50,fontWeight:700}}>{m.time}</span>
                        <span style={{fontSize:10,color:"#555",minWidth:22,textAlign:"center"}}>{isKo?"":m.group}</span>
                        <div style={{flex:1,display:"flex",alignItems:"center",gap:6,justifyContent:"flex-end"}}>
                          {isKo?(
                            <span style={{fontSize:12,color:"#666",fontStyle:"italic"}}>{m.home} {m.away}</span>
                          ):(
                            <>
                              <span style={{fontSize:12,color:played&&hg>ag?"#f5d78e":"#a89070",fontWeight:played&&hg>ag?700:400,textAlign:"right",minWidth:95}}>{FLAGS[m.home]||""} {m.home}</span>
                              {played
                                ?<span style={{fontSize:13,fontWeight:700,color:"#f5d78e",minWidth:36,textAlign:"center"}}>{hg}–{ag}</span>
                                :<span style={{fontSize:11,color:"#444",minWidth:36,textAlign:"center"}}>vs</span>
                              }
                              <span style={{fontSize:12,color:played&&ag>hg?"#f5d78e":"#a89070",fontWeight:played&&ag>hg?700:400,minWidth:95}}>{m.away} {FLAGS[m.away]||""}</span>
                            </>
                          )}
                        </div>
                        {involved&&<span style={{fontSize:9,color:GOLD,minWidth:14}} title="Sweepstake interest">★</span>}
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          </div>
        )}

      </div>

      <div style={{textAlign:"center",padding:"14px",borderTop:"1px solid rgba(201,168,76,0.07)",color:"#3a3020",fontSize:11,marginTop:10}}>
        FIFA World Cup 2026 · June 11–July 19 · USA, Canada &amp; Mexico · Scores via football-data.org
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
