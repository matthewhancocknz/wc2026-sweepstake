function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function computeStandings(scores){
  const s={};
  Object.values(GROUPS).flat().forEach(t=>{s[t]={p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0};});
  GROUP_FIXTURES.forEach(fix=>{
    const sc=scores[fix.id];
    if(!sc||sc.home==null||sc.away==null||sc.home===""||sc.away==="")return;
    const hg=parseInt(sc.home),ag=parseInt(sc.away);
    if(isNaN(hg)||isNaN(ag))return;
    const h=s[fix.home],a=s[fix.away];
    h.p++;a.p++;h.gf+=hg;h.ga+=ag;h.gd+=hg-ag;a.gf+=ag;a.ga+=hg;a.gd+=ag-hg;
    if(hg>ag){h.w++;h.pts+=3;a.l++;}else if(hg<ag){a.w++;a.pts+=3;h.l++;}else{h.d++;a.d++;h.pts++;a.pts++;}
  });
  return s;
}

function getGroupRankings(standings){
  const r={};
  Object.entries(GROUPS).forEach(([g,teams])=>{
    r[g]=[...teams].sort((a,b)=>{
      const sa=standings[a],sb=standings[b];
      if(sb.pts!==sa.pts)return sb.pts-sa.pts;
      if(sb.gd!==sa.gd)return sb.gd-sa.gd;
      return sb.gf-sa.gf;
    });
  });
  return r;
}

// Resolve the two teams in a given knockout round/match from bracket state
const KO_ROUNDS=[{key:"r32",matches:16},{key:"r16",matches:8},{key:"qf",matches:4},{key:"sf",matches:2},{key:"final",matches:1}];
function koMatchTeams(ko,round,mi){
  const entrants=ko?.entrants||[];
  const winners=ko?.winners||{r32:[],r16:[],qf:[],sf:[],final:[]};
  if(round==="r32") return [entrants[mi*2]||"", entrants[mi*2+1]||""];
  const prev={r16:"r32",qf:"r16",sf:"qf",final:"sf"}[round];
  return [winners[prev]?.[mi*2]||"", winners[prev]?.[mi*2+1]||""];
}
// Returns total 5-goal bonus points a team earned in knockout matches
function koFiveGoalCount(ko,team){
  const koScores=ko?.koScores||{};
  let count=0;
  KO_ROUNDS.forEach(({key,matches})=>{
    for(let mi=0;mi<matches;mi++){
      const [t1,t2]=koMatchTeams(ko,key,mi);
      if(t1!==team&&t2!==team)continue;
      const sc=koScores[`${key}-${mi}`];
      if(!sc||sc.home===""||sc.away===""||sc.home==null||sc.away==null)continue;
      const hg=parseInt(sc.home),ag=parseInt(sc.away);
      if(isNaN(hg)||isNaN(ag))continue;
      const scored=t1===team?hg:ag;
      if(scored>=5)count++;
    }
  });
  return count;
}

function computePts(assignments,names,scores,ko){
  const standings=computeStandings(scores);
  const rankings=getGroupRankings(standings);
  const groupComplete={};
  Object.keys(GROUPS).forEach(g=>{
    groupComplete[g]=GROUP_FIXTURES.filter(f=>f.group===g).every(f=>{
      const sc=scores[f.id];
      return sc&&sc.home!=null&&sc.home!==""&&sc.away!=null&&sc.away!=="";
    });
  });
  const toppers=new Set(Object.entries(rankings).filter(([g])=>groupComplete[g]).map(([,r])=>r[0]));
  const pts={};
  names.forEach(name=>{
    const sq=assignments[name];if(!sq)return;
    const myTeams=[sq.elite.name,sq.contender.name,sq.underdog.name];
    let p=0;
    myTeams.forEach(team=>{
      GROUP_FIXTURES.forEach(fix=>{
        const sc=scores[fix.id];
        if(!sc||sc.home==null||sc.away==null||sc.home===""||sc.away==="")return;
        const hg=parseInt(sc.home),ag=parseInt(sc.away);
        if(isNaN(hg)||isNaN(ag))return;
        if(fix.home!==team&&fix.away!==team)return;
        const isHome=fix.home===team;
        const won=isHome?hg>ag:ag>hg;
        const scored=isHome?hg:ag;
        const opp=isHome?fix.away:fix.home;
        if(won)p+=PTS.groupWin;
        if(scored>=5)p+=PTS.fiveGoals;
        if(UNDERDOG_SET.has(team)&&ELITE_SET.has(opp)&&won)p+=PTS.underdogElite;
      });
      if(toppers.has(team))p+=PTS.groupTop;
      if(ko?.entrants?.includes(team))p+=PTS.reachR32;
      if(ko?.r32?.includes(team))p+=PTS.r32Win;
      if(ko?.r16?.includes(team))p+=PTS.r16Win;
      if(ko?.qf?.includes(team))p+=PTS.qfWin;
      if(ko?.sf?.includes(team))p+=PTS.sfWin;
      if(ko?.final?.includes(team))p+=PTS.finalWin;
      if(ko?.champion===team)p+=PTS.champion;
      if(ko?.goldenBoot===team)p+=PTS.goldenBoot;
      // 5-goal bonus from knockout matches
      p += koFiveGoalCount(ko,team)*PTS.fiveGoals;
    });
    pts[name]=p;
  });
  return pts;
}

    GROUP_FIXTURES.forEach(fix=>{
      const sc=scores[fix.id];
      if(!sc||sc.home==null||sc.away==null||sc.home===""||sc.away==="")return;
      const hg=parseInt(sc.home),ag=parseInt(sc.away);
      if(isNaN(hg)||isNaN(ag))return;
      if(fix.home!==team&&fix.away!==team)return;
      const isHome=fix.home===team;
      const won=isHome?hg>ag:ag>hg;
      const drew=hg===ag;
      const scored=isHome?hg:ag;
      const opp=isHome?fix.away:fix.home;
      const scoreStr=isHome?`${hg}-${ag} vs ${opp}`:`${ag}-${hg} vs ${opp}`;
      if(won){teamLines.push({label:`Win (${scoreStr})`,pts:PTS.groupWin});total+=PTS.groupWin;}
      else if(drew){teamLines.push({label:`Draw (${scoreStr})`,pts:0,muted:true});}
      else {teamLines.push({label:`Loss (${scoreStr})`,pts:0,muted:true});}
      if(scored>=5){teamLines.push({label:`⭐ Scored ${scored} goals`,pts:PTS.fiveGoals});total+=PTS.fiveGoals;}
      if(UNDERDOG_SET.has(team)&&ELITE_SET.has(opp)&&won){teamLines.push({label:`🚀 Underdog beat Elite (${opp})`,pts:PTS.underdogElite});total+=PTS.underdogElite;}
    });
    if(toppers.has(team)){teamLines.push({label:`🥇 Topped group`,pts:PTS.groupTop});total+=PTS.groupTop;}
    if(ko?.entrants?.includes(team)){teamLines.push({label:`✅ Reached Round of 32`,pts:PTS.reachR32});total+=PTS.reachR32;}
    if(ko?.r32?.includes(team)){teamLines.push({label:`Won Round of 32`,pts:PTS.r32Win});total+=PTS.r32Win;}
    if(ko?.r16?.includes(team)){teamLines.push({label:`Won Round of 16`,pts:PTS.r16Win});total+=PTS.r16Win;}
    if(ko?.qf?.includes(team)){teamLines.push({label:`Reached Quarter-Final`,pts:PTS.qfWin});total+=PTS.qfWin;}
    if(ko?.sf?.includes(team)){teamLines.push({label:`Reached Semi-Final`,pts:PTS.sfWin});total+=PTS.sfWin;}
    if(ko?.final?.includes(team)){teamLines.push({label:`Reached Final`,pts:PTS.finalWin});total+=PTS.finalWin;}
    if(ko?.champion===team){teamLines.push({label:`🎖️ Won the World Cup`,pts:PTS.champion});total+=PTS.champion;}
    if(ko?.goldenBoot===team){teamLines.push({label:`👟 Golden Boot`,pts:PTS.goldenBoot});total+=PTS.goldenBoot;}
    const koFive=koFiveGoalCount(ko,team);
    if(koFive>0){teamLines.push({label:`⭐ Scored 5+ in knockout (×${koFive})`,pts:PTS.fiveGoals*koFive});total+=PTS.fiveGoals*koFive;}
    lines.push({tier,team,flag:teamObj.flag,teamLines});
  });
  return {lines,total};
}

  const lr=sorted.map((n,i)=>{const q=assignments[n];return`<tr><td class=rk>${M[i]||i+1}</td><td class=n>${n}</td><td>${q.elite.flag} ${q.elite.name} · ${q.contender.flag} ${q.contender.name} · ${q.underdog.flag} ${q.underdog.name}</td><td class=p>${cPts[n]||0}</td></tr>`;}).join("");
  const html=`<!DOCTYPE html><html><head><meta charset=utf-8><title>WC2026 Sweepstake</title><style>@page{margin:15mm;size:A4}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Georgia,serif;font-size:11pt;color:#1a1a1a}.hdr{text-align:center;border-bottom:3px solid #c9a84c;padding-bottom:12px;margin-bottom:20px}.hdr h1{font-size:20pt;font-weight:700}.hdr p{font-size:9pt;color:#666;margin-top:4px}h2{font-size:13pt;font-weight:700;margin-bottom:10px;padding-bottom:4px;border-bottom:1.5px solid #e0c870}section{margin-bottom:24px;page-break-inside:avoid}.pb{page-break-before:always}table{width:100%;border-collapse:collapse;font-size:10pt}th{background:#1a1a1a;color:#f5d78e;text-align:left;padding:6px 8px;font-size:8pt;text-transform:uppercase}td{padding:6px 8px;border-bottom:1px solid #e8e8e8;vertical-align:middle}tr:nth-child(even) td{background:#fafaf7}td.n{font-weight:700;width:16%}td.e{color:#b83030;width:20%}td.c{color:#1a6b7a;width:20%}td.u{color:#2e7a1f;width:20%}td.p{font-weight:700;text-align:center;width:8%;font-size:12pt;color:#9a7a30}td.rk{text-align:center;width:6%;font-size:14pt}.np{margin-top:24px;text-align:center}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}.np{display:none}}</style></head><body><div class=hdr><h1>Office Sweepstake 🏆 · FIFA World Cup 2026</h1><p>14 players · 3 teams each · June 11–July 19</p></div><section><h2>Squad Draw</h2><table><thead><tr><th>Player</th><th>🔴 Elite</th><th>🟡 Contender</th><th>🟢 Underdog</th><th style=text-align:center>Pts</th></tr></thead><tbody>${rows}</tbody></table></section><section class=pb><h2>Leaderboard</h2><table><thead><tr><th style=text-align:center>#</th><th>Player</th><th>Teams</th><th style=text-align:center>Pts</th></tr></thead><tbody>${lr}</tbody></table></section><div class=np><button onclick=window.print() style="padding:10px 32px;font-size:14px;background:#c9a84c;border:none;border-radius:6px;cursor:pointer;font-weight:700">🖨️ Print</button></div></body></html>`;
  const w=window.open("","_blank");w.document.write(html);w.document.close();w.focus();setTimeout(()=>w.print(),400);
}

// ── KNOCKOUT LADDER ───────────────────────────────────────────────────────────
function KnockoutLadder({ko, setKo, scores, rankings, standings, drawn, assignments, names}){
  const ALL_NATIONS = Object.values(GROUPS).flat();

  const teamOwner = {};
  const sweepTeams = new Set();
  if(drawn && assignments){
    names.forEach(n=>{
      const sq=assignments[n];
      if(sq){[sq.elite,sq.contender,sq.underdog].forEach(t=>{ if(t){teamOwner[t.name]=n;sweepTeams.add(t.name);} });}
    });
  }

  const entrants = ko.entrants || Array(32).fill("");
  const winners  = ko.winners  || {r32:Array(16).fill(""),r16:Array(8).fill(""),qf:Array(4).fill(""),sf:Array(2).fill(""),final:Array(1).fill("")};
  const koScores = ko.koScores || {};

  const syncToKo = (newEntrants,newWinners,newKoScores)=>{
    const flat = (arr)=>arr.filter(Boolean);
    const champ = newWinners.final[0]||"";
    setKo(prev=>({
      ...prev,
      entrants:newEntrants,
      winners:newWinners,
      koScores:newKoScores!==undefined?newKoScores:(prev.koScores||{}),
      r32:flat(newWinners.r32),
      r16:flat(newWinners.r16),
      qf:flat(newWinners.qf),
      sf:flat(newWinners.sf),
      final:flat(newWinners.final),
      champion:champ,
    }));
  };

  const setEntrant=(i,team)=>{
    const ne=[...entrants]; ne[i]=team;
    const nw=JSON.parse(JSON.stringify(winners));
    nw.r32=Array(16).fill("");nw.r16=Array(8).fill("");nw.qf=Array(4).fill("");nw.sf=Array(2).fill("");nw.final=Array(1).fill("");
    syncToKo(ne,nw);
  };

  const pickWinner=(round,matchIdx,team)=>{
    const nw=JSON.parse(JSON.stringify(winners));
    nw[round][matchIdx]=team;
    const order=["r32","r16","qf","sf","final"];
    const ri=order.indexOf(round);
    for(let k=ri+1;k<order.length;k++){
      const len={r16:8,qf:4,sf:2,final:1}[order[k]];
      nw[order[k]]=Array(len).fill("");
    }
    syncToKo(entrants,nw);
  };

  const setScore=(round,mi,side,val)=>{
    const key=`${round}-${mi}`;
    const ns={...koScores,[key]:{...(koScores[key]||{}),[side]:val}};
    syncToKo(entrants,winners,ns);
  };

  const getMatchTeams=(round,matchIdx)=>{
    if(round==="r32") return [entrants[matchIdx*2]||"", entrants[matchIdx*2+1]||""];
    const prev={r16:"r32",qf:"r16",sf:"qf",final:"sf"}[round];
    return [winners[prev][matchIdx*2]||"", winners[prev][matchIdx*2+1]||""];
  };

  const champion = winners.final[0]||"";

  // One match block (two teams, score inputs, winner pick)
  const MatchBlock=({round,mi})=>{
    const [t1,t2]=getMatchTeams(round,mi);
    const w=winners[round][mi];
    const sc=koScores[`${round}-${mi}`]||{};
    const isR32=round==="r32";
    const TeamRow=({team,slotIdx,side})=>{
      const isSweep=sweepTeams.has(team);
      const isWin=w===team&&!!team;
      const goals=sc[side];
      const five=goals!==""&&goals!=null&&parseInt(goals)>=5;
      return(
        <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:3}}>
          {isR32?(
            <select value={team} onChange={e=>setEntrant(mi*2+slotIdx,e.target.value)}
              style={{flex:1,minWidth:0,background:"rgba(0,0,0,0.4)",border:`1px solid ${isWin?GOLD:"rgba(255,255,255,0.1)"}`,borderRadius:5,color:team?(isWin?"#f5d78e":isSweep?GOLD:"#bbb"):"#555",fontFamily:"Georgia,serif",fontSize:10,padding:"3px 4px",outline:"none"}}>
              <option value="">— team —</option>
              {ALL_NATIONS.map(t=><option key={t} value={t}>{t}</option>)}
            </select>
          ):(
            <div onClick={team?()=>pickWinner(round,mi,team):null} title={teamOwner[team]?`${team} — ${teamOwner[team]}`:team}
              style={{flex:1,minWidth:0,cursor:team?"pointer":"default",background:isWin?"rgba(201,168,76,0.22)":"rgba(255,255,255,0.04)",border:`1px solid ${isWin?GOLD:isSweep?"rgba(201,168,76,0.3)":"rgba(255,255,255,0.08)"}`,borderRadius:5,color:isWin?"#f5d78e":team?(isSweep?GOLD:"#bbb"):"#555",fontSize:10,fontWeight:isWin?700:400,padding:"3px 5px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
              {team?<>{FLAGS[team]||""} {team}{isSweep?" ★":""}</>:<span style={{fontStyle:"italic"}}>—</span>}
            </div>
          )}
          <input type="number" min="0" max="99" value={goals??""} onChange={e=>setScore(round,mi,side,e.target.value)}
            title="Goals" style={{width:26,textAlign:"center",background:"rgba(255,255,255,0.07)",border:`1px solid ${five?"#95e17d":"rgba(201,168,76,0.25)"}`,borderRadius:4,color:five?"#95e17d":"#f5d78e",fontFamily:"Georgia,serif",fontSize:11,fontWeight:700,padding:"2px 0",outline:"none"}}/>
        </div>
      );
    };
    return(
      <div style={{border:`1px solid ${w?"rgba(201,168,76,0.3)":"rgba(255,255,255,0.06)"}`,borderRadius:7,padding:"5px",background:"rgba(255,255,255,0.015)"}}>
        <TeamRow team={t1} slotIdx={0} side="home"/>
        <TeamRow team={t2} slotIdx={1} side="away"/>
        {isR32&&(t1||t2)&&(
          <div style={{display:"flex",gap:3,marginTop:2}}>
            {t1&&<button onClick={()=>pickWinner("r32",mi,t1)} style={{flex:1,fontSize:9,padding:"2px",borderRadius:4,cursor:"pointer",fontFamily:"Georgia,serif",background:w===t1?"rgba(201,168,76,0.3)":"rgba(255,255,255,0.04)",border:`1px solid ${w===t1?GOLD:"rgba(255,255,255,0.1)"}`,color:w===t1?"#f5d78e":"#888"}}>▲ win</button>}
            {t2&&<button onClick={()=>pickWinner("r32",mi,t2)} style={{flex:1,fontSize:9,padding:"2px",borderRadius:4,cursor:"pointer",fontFamily:"Georgia,serif",background:w===t2?"rgba(201,168,76,0.3)":"rgba(255,255,255,0.04)",border:`1px solid ${w===t2?GOLD:"rgba(255,255,255,0.1)"}`,color:w===t2?"#f5d78e":"#888"}}>▼ win</button>}
          </div>
        )}
      </div>
    );
  };

  const ROW_H=104;
  // Column renderer for one side. side="L" uses matches 0..n/2-1, side="R" uses the rest.
  const Column=({round,roundIdx,side,label,pts})=>{
    const total={r32:16,r16:8,qf:4,sf:2,final:1}[round];
    const half=total/2;
    const span=Math.pow(2,roundIdx);
    const blockH=ROW_H*span;
    const indices=side==="L"?Array.from({length:half},(_,i)=>i):Array.from({length:half},(_,i)=>half+i);
    return(
      <div style={{flex:"0 0 auto",width:150,display:"flex",flexDirection:"column"}}>
        <div style={{color:GOLD,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:8,textAlign:"center",minHeight:28}}>
          {label}<div style={{color:"#555",fontSize:9,fontWeight:400}}>+{pts}</div>
        </div>
        {indices.map(mi=>(
          <div key={mi} style={{height:blockH,display:"flex",flexDirection:"column",justifyContent:"center"}}>
            <MatchBlock round={round} mi={mi}/>
          </div>
        ))}
      </div>
    );
  };

  return(
    <div>
      <div style={{...secTitle,marginBottom:6}}>🏆 Knockout Bracket</div>
      <p style={{color:"#a89070",fontSize:13,marginBottom:8}}>
        Fill the 32 entrants, enter scores, and click a team to advance them. Both sides converge on the Final. A team scoring 5+ in a knockout match earns the bonus too.
      </p>
      {champion&&<div style={{marginBottom:16,padding:"10px 16px",background:"rgba(201,168,76,0.12)",border:`1px solid ${GOLD}`,borderRadius:8,fontSize:15,color:"#f5d78e",fontWeight:700}}>🎖️ Champion: {FLAGS[champion]} {champion}{teamOwner[champion]?` — ${teamOwner[champion]}`:""}</div>}

      <div style={{overflowX:"auto",paddingBottom:12}}>
        <div style={{display:"flex",gap:12,minWidth:1180,justifyContent:"center"}}>
          {/* LEFT SIDE */}
          <Column round="r32" roundIdx={0} side="L" label="R32" pts={PTS.r32Win}/>
          <Column round="r16" roundIdx={1} side="L" label="R16" pts={PTS.r16Win}/>
          <Column round="qf"  roundIdx={2} side="L" label="QF"  pts={PTS.qfWin}/>
          <Column round="sf"  roundIdx={3} side="L" label="SF"  pts={PTS.sfWin}/>

          {/* FINAL (center) */}
          <div style={{flex:"0 0 auto",width:160,display:"flex",flexDirection:"column"}}>
            <div style={{color:GOLD,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:8,textAlign:"center",minHeight:28}}>
              🏆 Final<div style={{color:"#555",fontSize:9,fontWeight:400}}>+{PTS.finalWin} / 🎖️+{PTS.champion}</div>
            </div>
            <div style={{height:ROW_H*16,display:"flex",flexDirection:"column",justifyContent:"center"}}>
              <MatchBlock round="final" mi={0}/>
            </div>
          </div>

          {/* RIGHT SIDE */}
          <Column round="sf"  roundIdx={3} side="R" label="SF"  pts={PTS.sfWin}/>
          <Column round="qf"  roundIdx={2} side="R" label="QF"  pts={PTS.qfWin}/>
          <Column round="r16" roundIdx={1} side="R" label="R16" pts={PTS.r16Win}/>
          <Column round="r32" roundIdx={0} side="R" label="R32" pts={PTS.r32Win}/>
        </div>
      </div>

      {/* Golden Boot */}
      <div style={{marginTop:24,paddingTop:18,borderTop:"1px solid rgba(201,168,76,0.15)"}}>
        <div style={{color:GOLD,fontSize:13,fontWeight:700,marginBottom:10}}>👟 Golden Boot (team of top scorer) <span style={{color:"#555",fontWeight:400}}>+{PTS.goldenBoot} pts</span></div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {["none",...ALL_NATIONS].map(team=>{
            const val=team==="none"?"":team;
            const active=ko.goldenBoot===val;
            return(
              <button key={team} onClick={()=>setKo(p=>({...p,goldenBoot:val}))} style={{padding:"5px 11px",borderRadius:20,cursor:"pointer",fontFamily:"Georgia,serif",fontSize:11,background:active?"rgba(201,168,76,0.25)":"rgba(255,255,255,0.04)",border:`1px solid ${active?GOLD:"rgba(255,255,255,0.1)"}`,color:active?"#f5d78e":"#777",fontWeight:active?700:400}}>
                {team==="none"?"— none yet —":`${FLAGS[team]||""} ${team}`}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]         = useState("squads");
  const [names,setNames]     = useState(PRESET_NAMES);
  const [assignments,setAssignments] = useState(PRESET_ASSIGNMENTS);
  const [drawn,setDrawn]     = useState(true);
  const [scores,setScores]   = useState({});
  const [ko,setKo]           = useState(emptyKo);
  const [overrides,setOverrides] = useState(emptyOverrides);
  const [activeGroup,setActiveGroup] = useState("A");
  const [confirmReset,setConfirmReset] = useState(false);
  const [manualMode,setManualMode] = useState(true);
  const [draft,setDraft]     = useState({});
  const [showExport,setShowExport] = useState(false);
  const [importText,setImportText] = useState("");
  const [importError,setImportError] = useState("");
  const [saved,setSaved]     = useState(false);

  // Load on mount
  useEffect(()=>{
    const d=loadLocal();
    if(d){
      setNames(d.names||PRESET_NAMES);
      setAssignments(d.assignments||PRESET_ASSIGNMENTS);
      setDrawn(d.drawn!=null?d.drawn:true);
      setScores(d.scores||{});
      setKo(d.ko||emptyKo);
      setOverrides(d.overrides||emptyOverrides);
      if(d.drawn!=null?d.drawn:true) setTab("squads");
    }
  },[]);

  // Persist
  const persist = useCallback((state)=>{
    saveLocal(state);
    setSaved(true);
    setTimeout(()=>setSaved(false),1400);
  },[]);

  useEffect(()=>{
    persist({names,assignments,drawn,scores,ko,overrides});
  },[names,assignments,drawn,scores,ko,overrides]);

  const cPts = useMemo(()=>{
    if(!drawn||!assignments)return{};
    const base=computePts(assignments,names,scores,ko);
    const result={};
    names.forEach(name=>{
      result[name]=(base[name]||0)+(parseInt(overrides[name]?.pts)||0);
    });
    return result;
  },[drawn,assignments,names,scores,ko,overrides]);

  const standings = useMemo(()=>computeStandings(scores),[scores]);
  const rankings  = useMemo(()=>getGroupRankings(standings),[standings]);
  const sorted    = drawn?[...names].sort((a,b)=>(cPts[b]||0)-(cPts[a]||0)):[];
  const medal     = i=>["🥇","🥈","🥉"][i]||"";

  const handleScore=(id,side,val)=>setScores(p=>({...p,[id]:{...(p[id]||{}),[side]:val}}));
  const lockDraw=()=>{
    const allOk=names.every(n=>draft[n]?.elite&&draft[n]?.contender&&draft[n]?.underdog);
    if(!allOk){alert("Please assign all 3 teams for every player.");return;}
    setAssignments({...draft});setScores({});setKo(emptyKo);setOverrides(emptyOverrides);setDrawn(true);setConfirmReset(false);setTab("squads");
  };
  const randomDraw=()=>{
    const e=shuffle(ALL_TEAMS.elite),c=shuffle(ALL_TEAMS.contender),u=shuffle(ALL_TEAMS.underdog);
    const r={};names.forEach((n,i)=>{r[n]={elite:e[i],contender:c[i],underdog:u[i]};});
    setAssignments(r);setScores({});setKo(emptyKo);setOverrides(emptyOverrides);setDrawn(true);setConfirmReset(false);setTab("squads");
  };
  const setDraftTeam=(name,tier,teamName)=>{
    const obj=ALL_14.find(t=>t.name===teamName)||null;
    setDraft(p=>({...p,[name]:{...(p[name]||{}),[tier]:obj||undefined}}));
  };
  const usedIn=tier=>new Set(names.map(n=>draft[n]?.[tier]?.name).filter(Boolean));
  const doImport=()=>{
    try{
      const d=JSON.parse(importText);
      if(!d.names||!d.assignments)throw new Error("Invalid data");
      setNames(d.names);setAssignments(d.assignments);setDrawn(d.drawn||false);
      setScores(d.scores||{});setKo(d.ko||emptyKo);setOverrides(d.overrides||emptyOverrides);
      setShowExport(false);setImportText("");setImportError("");setTab("squads");
    }catch(e){setImportError("Invalid — paste the full exported text.");}
  };

  const tabs=[
    {id:"setup",    label:"⚙️ Setup"},
    {id:"squads",   label:"🎯 Squads",    disabled:!drawn},
    {id:"scores",   label:"⚽ Scores",    disabled:!drawn},
    {id:"knockout", label:"🏆 Knockout",  disabled:!drawn},
    {id:"overrides",label:"✏️ Overrides", disabled:!drawn},
    {id:"audit",label:"🔍 Audit", disabled:!drawn},
    {id:"leaderboard",label:"📊 Leaderboard",disabled:!drawn},
    {id:"fixtures", label:"📅 Fixtures"},
  ];

  return(
    <div style={{minHeight:"100vh",background:bg,fontFamily:"Georgia,serif",color:"#f0e6d3"}}>

      {/* Header */}
      <div style={{background:"linear-gradient(90deg,#1a0a00,#2d1500,#1a0a00)",borderBottom:`2px solid ${GOLD}`,padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontSize:9,letterSpacing:4,color:GOLD,textTransform:"uppercase",marginBottom:2}}>FIFA World Cup 2026 · {APP_VERSION}</div>
          <h1 style={{margin:0,fontSize:"clamp(17px,3.5vw,28px)",fontWeight:700,background:`linear-gradient(90deg,#f5d78e,${GOLD},#f5d78e)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
            Office Sweepstake 🏆
          </h1>
          <div style={{fontSize:10,color:"#7a6040",marginTop:2,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span>14 players · 3 teams each</span>
            <span style={{color:"#5a4a30",background:"rgba(201,168,76,0.1)",padding:"1px 7px",borderRadius:10,fontSize:9,letterSpacing:0.5}}>{APP_VERSION}</span>
            {saved&&<span style={{color:"#95e17d"}}>✓ saved</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>!t.disabled&&setTab(t.id)}
              style={{...tabSty(tab===t.id),color:t.disabled?"#444":tab===t.id?"#f5d78e":GOLD,cursor:t.disabled?"not-allowed":"pointer"}}>
              {t.label}
            </button>
          ))}
          <div style={{width:1,height:20,background:"rgba(255,255,255,0.1)",margin:"0 3px"}}/>
          <button onClick={()=>setShowExport(v=>!v)} style={{...tabSty(showExport)}}>📤 Export/Import</button>
        </div>
      </div>

      {/* Export/Import panel */}
      {showExport&&(
        <div style={{background:"#0d1520",borderBottom:"1px solid rgba(201,168,76,0.2)",padding:"16px 20px"}}>
          <div style={{maxWidth:900,margin:"0 auto"}}>
            <div style={{color:"#f5d78e",fontSize:14,fontWeight:700,marginBottom:8}}>📤 Export / Import Data</div>
            <p style={{color:"#a89070",fontSize:12,marginBottom:12}}>Export your scores and share with teammates. They paste into Import to sync their copy.</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
              <div>
                <div style={{color:GOLD,fontSize:11,fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>Export (copy this)</div>
                <textarea readOnly value={JSON.stringify({names,assignments,drawn,scores,ko,overrides},null,2)} onClick={e=>e.target.select()}
                  style={{width:"100%",height:110,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(201,168,76,0.2)",borderRadius:6,color:"#c9a84c",fontFamily:"monospace",fontSize:10,padding:8,resize:"none",outline:"none"}}/>
                <button onClick={()=>navigator.clipboard.writeText(JSON.stringify({names,assignments,drawn,scores,ko,overrides}))} style={{...gBtn,marginTop:6,fontSize:12,padding:"5px 12px"}}>📋 Copy</button>
              </div>
              <div>
                <div style={{color:GOLD,fontSize:11,fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>Import</div>
                <textarea value={importText} onChange={e=>setImportText(e.target.value)} placeholder="Paste exported data here…"
                  style={{width:"100%",height:110,background:"rgba(255,255,255,0.04)",border:`1px solid ${importError?"#f66":"rgba(201,168,76,0.2)"}`,borderRadius:6,color:"#f0e6d3",fontFamily:"monospace",fontSize:10,padding:8,resize:"none",outline:"none"}}/>
                {importError&&<div style={{color:"#f66",fontSize:11,marginTop:3}}>{importError}</div>}
                <button onClick={doImport} style={{...gBtn,marginTop:6,fontSize:12,padding:"5px 12px"}}>⬇️ Import</button>
              </div>
            </div>
          </div>
        </div>
      )}

      <div style={{padding:"22px 18px",maxWidth:1200,margin:"0 auto"}}>

        {/* ── SETUP ── */}
        {tab==="setup"&&(
          <div>
            <div style={secTitle}>⚙️ Setup</div>
            <p style={{color:"#a89070",fontSize:13,marginBottom:16}}>
              Player names and team assignments.
              {drawn&&<span style={{color:GOLD}}> Draw is locked.</span>}
            </p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:7,marginBottom:22}}>
              {names.map((name,i)=>(
                <div key={i} style={{...card,display:"flex",alignItems:"center",gap:7,padding:"8px 11px",borderColor:drawn?"rgba(255,255,255,0.05)":"rgba(201,168,76,0.2)"}}>
                  <span style={{color:GOLD,fontSize:11,minWidth:18,fontWeight:700}}>{i+1}</span>
                  <input value={name} disabled={drawn} onChange={e=>{const n=[...names];n[i]=e.target.value;setNames(n);}}
                    style={{background:"transparent",border:"none",outline:"none",color:drawn?"#666":"#f0e6d3",fontFamily:"Georgia,serif",fontSize:13,width:"100%"}}
                    placeholder={`Player ${i+1}`}/>
                </div>
              ))}
            </div>
            {!drawn?(
              <div>
                <div style={{display:"flex",gap:8,marginBottom:18}}>
                  <button onClick={()=>setManualMode(false)} style={tabSty(!manualMode)}>🎲 Random Draw</button>
                  <button onClick={()=>{setManualMode(true);const d={};names.forEach(n=>{d[n]=draft[n]||{};});setDraft(d);}} style={tabSty(manualMode)}>✏️ Manual Assignment</button>
                </div>
                {!manualMode?(
                  <button onClick={randomDraw} style={{background:"linear-gradient(135deg,#c9a84c,#a07830)",color:"#0a0a1a",border:"none",borderRadius:10,padding:"12px 36px",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"Georgia,serif",boxShadow:"0 4px 20px rgba(201,168,76,0.3)"}}>
                    🎲 Draw Teams Randomly
                  </button>
                ):(
                  <div>
                    <p style={{color:"#a89070",fontSize:12,marginBottom:12}}>Assign each player's 3 teams. Already-taken teams are marked.</p>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:10,marginBottom:16}}>
                      {names.map(name=>{
                        const da=draft[name]||{};
                        const allDone=da.elite&&da.contender&&da.underdog;
                        return(
                          <div key={name} style={{...card,padding:"11px 13px",borderColor:allDone?"rgba(201,168,76,0.45)":"rgba(255,255,255,0.07)"}}>
                            <div style={{fontWeight:700,fontSize:13,color:"#f5d78e",marginBottom:8}}>{allDone?"✓ ":""}{name}</div>
                            {[{tier:"elite",label:"🔴 Elite",opts:ALL_TEAMS.elite,color:"#ff6b6b"},
                              {tier:"contender",label:"🟡 Contender",opts:ALL_TEAMS.contender,color:"#4ecdc4"},
                              {tier:"underdog",label:"🟢 Underdog",opts:ALL_TEAMS.underdog,color:"#95e17d"},
                            ].map(({tier,label,opts,color})=>{
                              const used=usedIn(tier);
                              return(
                                <div key={tier} style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
                                  <span style={{fontSize:10,color,minWidth:78,fontWeight:700}}>{label}</span>
                                  <select value={da[tier]?.name||""} onChange={e=>setDraftTeam(name,tier,e.target.value)}
                                    style={{flex:1,background:"rgba(0,0,0,0.4)",border:`1px solid ${da[tier]?"rgba(201,168,76,0.4)":"rgba(255,255,255,0.1)"}`,borderRadius:5,color:da[tier]?"#f5d78e":"#888",fontFamily:"Georgia,serif",fontSize:12,padding:"4px 6px",outline:"none"}}>
                                    <option value="">— pick —</option>
                                    {opts.map(t=>(
                                      <option key={t.name} value={t.name} disabled={used.has(t.name)&&da[tier]?.name!==t.name}>
                                        {t.flag} {t.name}{used.has(t.name)&&da[tier]?.name!==t.name?" (taken)":""}
                                      </option>
                                    ))}
                                  </select>
                                </div>
                              );
                            })}
                          </div>
                        );
                      })}
                    </div>
                    <button onClick={lockDraw} style={{background:"linear-gradient(135deg,#c9a84c,#a07830)",color:"#0a0a1a",border:"none",borderRadius:10,padding:"12px 36px",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"Georgia,serif",boxShadow:"0 4px 20px rgba(201,168,76,0.3)"}}>
                      🔒 Lock In Assignments
                    </button>
                  </div>
                )}
              </div>
            ):(
              <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
                {!confirmReset?(
                  <>
                    <button onClick={()=>setConfirmReset("scores")} style={rBtn}>🗑️ Reset Scores &amp; Results</button>
                    <button onClick={()=>setConfirmReset("all")} style={{...rBtn,opacity:0.7}}>🔄 Reset Everything</button>
                  </>
                ):(
                  confirmReset==="scores"?(
                    <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
                      <span style={{color:"#ff9999",fontSize:13}}>⚠️ Wipes all scores and points. Teams stay. Sure?</span>
                      <button onClick={()=>{
                        setScores({});setKo(emptyKo);setOverrides(emptyOverrides);setConfirmReset(false);
                        const saved=loadLocal();if(saved){saved.scores={};saved.ko=emptyKo;saved.overrides={};saveLocal(saved);}
                      }} style={{...rBtn,fontWeight:700}}>Yes, reset scores</button>
                      <button onClick={()=>setConfirmReset(false)} style={gBtn}>Cancel</button>
                    </div>
                  ):(
                    <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
                      <span style={{color:"#ff9999",fontSize:13}}>⚠️ Wipes everything including teams. Sure?</span>
                      <button onClick={()=>{setDrawn(false);setAssignments(null);setDraft({});setManualMode(true);setScores({});setKo(emptyKo);setOverrides(emptyOverrides);setConfirmReset(false);setTab("setup");}} style={{...rBtn,fontWeight:700}}>Yes, reset all</button>
                      <button onClick={()=>setConfirmReset(false)} style={gBtn}>Cancel</button>
                    </div>
                  )
                )}
              </div>
            )}
          </div>
        )}

        {/* ── SQUADS ── */}
        {tab==="squads"&&drawn&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
              <div style={secTitle}>🎯 Squad Assignments</div>
              <button onClick={()=>openPrint(assignments,names,cPts)} style={gBtn}>🖨️ Print / Save PDF</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:11}}>
              {names.map(name=>{
                const sq=assignments[name];if(!sq)return null;
                const rank=sorted.indexOf(name);
                return(
                  <div key={name} style={{...card,borderColor:rank===0?GOLD:"rgba(201,168,76,0.15)",boxShadow:rank===0?"0 0 16px rgba(201,168,76,0.15)":"none"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
                      <div style={{fontWeight:700,fontSize:14,color:"#f5d78e"}}>{medal(rank)} {name}</div>
                      <div style={{background:"rgba(201,168,76,0.15)",border:"1px solid rgba(201,168,76,0.4)",borderRadius:20,padding:"2px 10px",fontSize:13,color:GOLD,fontWeight:700}}>{cPts[name]||0} pts</div>
                    </div>
                    {[{tier:"Elite",team:sq.elite,color:"#ff6b6b",bg:"rgba(255,107,107,0.08)"},
                      {tier:"Contender",team:sq.contender,color:"#4ecdc4",bg:"rgba(78,205,196,0.08)"},
                      {tier:"Underdog",team:sq.underdog,color:"#95e17d",bg:"rgba(149,225,125,0.08)"}
                    ].map(({tier,team,color,bg})=>(
                      <div key={tier} style={{background:bg,border:`1px solid ${color}30`,borderRadius:7,padding:"6px 10px",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
                        <div style={{display:"flex",alignItems:"center",gap:7}}>
                          <span style={{fontSize:18}}>{team.flag}</span>
                          <span style={{fontSize:13,color:"#e8ddd0"}}>{team.name}</span>
                        </div>
                        <span style={{fontSize:9,letterSpacing:1,textTransform:"uppercase",color,fontWeight:700}}>{tier}</span>
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── SCORES ── */}
        {tab==="scores"&&drawn&&(
          <div>
            <div style={secTitle}>⚽ Match Scores</div>
            <p style={{color:"#a89070",fontSize:13,marginBottom:14}}>Enter scores as matches finish — points calculate automatically.</p>
            <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:16}}>
              {Object.keys(GROUPS).map(g=>{
                const done=GROUP_FIXTURES.filter(f=>f.group===g).filter(f=>{const sc=scores[f.id];return sc?.home!=null&&sc?.home!==""&&sc?.away!=null&&sc?.away!=="";}).length;
                return(
                  <button key={g} onClick={()=>setActiveGroup(g)} style={tabSty(activeGroup===g)}>
                    Group {g}{done===6&&<span style={{color:"#95e17d",fontSize:9}}> ✓</span>}
                  </button>
                );
              })}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18}}>
              <div>
                <div style={{color:GOLD,fontSize:11,fontWeight:700,marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>Group {activeGroup} Standings</div>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead><tr style={{color:"#666"}}>{["","P","W","D","L","GD","Pts"].map(h=><th key={h} style={{padding:"3px 5px",textAlign:h===""?"left":"center",fontWeight:600}}>{h}</th>)}</tr></thead>
                  <tbody>
                    {rankings[activeGroup]?.map((team,i)=>{
                      const s=standings[team]||{};
                      return(
                        <tr key={team} style={{borderTop:"1px solid rgba(255,255,255,0.05)"}}>
                          <td style={{padding:"4px 5px",color:i<2?"#f5d78e":"#888",fontWeight:i<2?700:400,whiteSpace:"nowrap"}}>{FLAGS[team]} {team}</td>
                          {[s.p,s.w,s.d,s.l,(s.gd||0)>=0?`+${s.gd||0}`:s.gd,s.pts].map((v,j)=>(
                            <td key={j} style={{padding:"4px 5px",textAlign:"center",color:j===5?GOLD:"#ccc",fontWeight:j===5?700:400}}>{v??0}</td>
                          ))}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <div>
                <div style={{color:GOLD,fontSize:11,fontWeight:700,marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>Fixtures</div>
                {GROUP_FIXTURES.filter(f=>f.group===activeGroup).map(fix=>(
                  <ScoreInput key={fix.id} fixture={fix} score={scores[fix.id]} onChange={handleScore}/>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ── KNOCKOUT ── */}
        {tab==="knockout"&&drawn&&(
          <KnockoutLadder ko={ko} setKo={setKo} standings={standings} rankings={rankings} scores={scores} drawn={drawn} assignments={assignments} names={names}/>
        )}

        {/* ── OVERRIDES ── */}
        {tab==="overrides"&&drawn&&(
          <div>
            <div style={secTitle}>✏️ Points Overrides</div>
            <p style={{color:"#a89070",fontSize:13,marginBottom:20}}>Manually adjust points on top of auto-calculated totals — for bonuses, corrections, or side bets.</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:11}}>
              {names.map(name=>{
                const ov=overrides[name]||{pts:0,note:""};
                const base=computePts(assignments,names,scores,ko)[name]||0;
                const total=base+(parseInt(ov.pts)||0);
                const adj=parseInt(ov.pts)||0;
                return(
                  <div key={name} style={{...card,borderColor:adj!==0?"rgba(201,168,76,0.4)":"rgba(255,255,255,0.08)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                      <div style={{fontWeight:700,fontSize:14,color:"#f5d78e"}}>{name}</div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        {adj!==0&&<span style={{fontSize:11,color:adj>0?"#95e17d":"#ff9999",fontWeight:700}}>{adj>0?`+${adj}`:adj}</span>}
                        <div style={{background:"rgba(201,168,76,0.15)",border:"1px solid rgba(201,168,76,0.4)",borderRadius:20,padding:"2px 10px",fontSize:13,color:GOLD,fontWeight:700}}>{total} pts</div>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:7}}>
                      <span style={{color:"#888",fontSize:12,minWidth:90}}>Adjust points:</span>
                      <div style={{display:"flex",gap:5,alignItems:"center"}}>
                        <button onClick={()=>setOverrides(p=>({...p,[name]:{...(p[name]||{}),pts:(parseInt(p[name]?.pts)||0)-1}}))} style={{width:28,height:28,borderRadius:5,background:"rgba(255,80,80,0.12)",border:"1px solid rgba(255,80,80,0.3)",color:"#ff9999",cursor:"pointer",fontSize:16,fontFamily:"Georgia,serif",fontWeight:700}}>−</button>
                        <input type="number" value={ov.pts||0} onChange={e=>setOverrides(p=>({...p,[name]:{...(p[name]||{}),pts:e.target.value}}))}
                          style={{width:52,textAlign:"center",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(201,168,76,0.3)",borderRadius:5,color:adj>0?"#95e17d":adj<0?"#ff9999":"#f0e6d3",fontFamily:"Georgia,serif",fontSize:15,fontWeight:700,padding:"4px 0",outline:"none"}}/>
                        <button onClick={()=>setOverrides(p=>({...p,[name]:{...(p[name]||{}),pts:(parseInt(p[name]?.pts)||0)+1}}))} style={{width:28,height:28,borderRadius:5,background:"rgba(149,225,125,0.1)",border:"1px solid rgba(149,225,125,0.3)",color:"#95e17d",cursor:"pointer",fontSize:16,fontFamily:"Georgia,serif",fontWeight:700}}>+</button>
                        {adj!==0&&<button onClick={()=>setOverrides(p=>({...p,[name]:{...(p[name]||{}),pts:0}}))} style={{padding:"3px 8px",borderRadius:5,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",color:"#666",cursor:"pointer",fontSize:11,fontFamily:"Georgia,serif"}}>reset</button>}
                      </div>
                    </div>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      <span style={{color:"#888",fontSize:12,minWidth:90}}>Reason:</span>
                      <input value={ov.note||""} onChange={e=>setOverrides(p=>({...p,[name]:{...(p[name]||{}),note:e.target.value}}))}
                        placeholder="e.g. bonus for correct prediction"
                        style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:5,color:"#c0b090",fontFamily:"Georgia,serif",fontSize:12,padding:"5px 8px",outline:"none"}}/>
                    </div>
                    {ov.note&&<div style={{marginTop:6,fontSize:11,color:"#7a6040",fontStyle:"italic"}}>📝 {ov.note}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── AUDIT ── */}
        {tab==="audit"&&drawn&&(
          <div>
            <div style={secTitle}>🔍 Points Audit</div>
            <p style={{color:"#a89070",fontSize:13,marginBottom:20}}>Every point each player has earned, broken down by team and reason. Use this to verify totals.</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(330px,1fr))",gap:12}}>
              {[...names].sort((a,b)=>(cPts[b]||0)-(cPts[a]||0)).map(name=>{
                const audit=auditPlayer(name,assignments,scores,ko);
                const ovPts=parseInt(overrides[name]?.pts)||0;
                const grand=audit.total+ovPts;
                return(
                  <div key={name} style={{...card,padding:"14px 16px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,paddingBottom:8,borderBottom:"1px solid rgba(201,168,76,0.15)"}}>
                      <div style={{fontWeight:700,fontSize:15,color:"#f5d78e"}}>{name}</div>
                      <div style={{background:"rgba(201,168,76,0.15)",border:"1px solid rgba(201,168,76,0.4)",borderRadius:20,padding:"2px 12px",fontSize:14,color:GOLD,fontWeight:700}}>{grand} pts</div>
                    </div>
                    {audit.lines.map(({tier,team,flag,teamLines})=>{
                      const subtotal=teamLines.reduce((s,l)=>s+(l.pts||0),0);
                      const tierColor={elite:"#ff6b6b",contender:"#4ecdc4",underdog:"#95e17d"}[tier];
                      return(
                        <div key={tier} style={{marginBottom:10}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                            <span style={{fontSize:12,fontWeight:700,color:tierColor}}>{flag} {team}</span>
                            <span style={{fontSize:12,color:subtotal>0?GOLD:"#555",fontWeight:700}}>{subtotal} pts</span>
                          </div>
                          {teamLines.length===0?(
                            <div style={{fontSize:11,color:"#555",paddingLeft:8,fontStyle:"italic"}}>No points yet</div>
                          ):(
                            teamLines.map((l,li)=>(
                              <div key={li} style={{display:"flex",justifyContent:"space-between",fontSize:11,paddingLeft:8,marginBottom:2,color:l.muted?"#666":"#c0b090"}}>
                                <span>{l.label}</span>
                                <span style={{color:l.pts>0?"#95e17d":"#555",fontWeight:l.pts>0?700:400,minWidth:30,textAlign:"right"}}>{l.pts>0?`+${l.pts}`:"0"}</span>
                              </div>
                            ))
                          )}
                        </div>
                      );
                    })}
                    {ovPts!==0&&(
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:12,paddingTop:8,borderTop:"1px solid rgba(255,255,255,0.08)",color:ovPts>0?"#95e17d":"#ff9999"}}>
                        <span>✏️ Manual override{overrides[name]?.note?` (${overrides[name].note})`:""}</span>
                        <span style={{fontWeight:700,minWidth:30,textAlign:"right"}}>{ovPts>0?`+${ovPts}`:ovPts}</span>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── LEADERBOARD ── */}
        {tab==="leaderboard"&&drawn&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
              <div style={secTitle}>📊 Leaderboard</div>
              <button onClick={()=>openPrint(assignments,names,cPts)} style={gBtn}>🖨️ Print / Save PDF</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {sorted.map((name,i)=>{
                const sq=assignments[name];if(!sq)return null;
                const pct=(cPts[name]||0)/Math.max(1,cPts[sorted[0]]||1)*100;
                const adj=parseInt(overrides[name]?.pts)||0;
                return(
                  <div key={name} style={{...card,background:i===0?"linear-gradient(90deg,rgba(201,168,76,0.15),rgba(201,168,76,0.05))":"rgba(255,255,255,0.03)",borderColor:i===0?"rgba(201,168,76,0.5)":"rgba(255,255,255,0.07)",display:"flex",alignItems:"center",gap:11,flexWrap:"wrap",padding:"11px 15px"}}>
                    <div style={{fontSize:17,minWidth:26,textAlign:"center"}}>{medal(i)||<span style={{color:"#555",fontSize:12}}>{i+1}</span>}</div>
                    <div style={{flex:1,minWidth:90}}>
                      <div style={{fontWeight:700,fontSize:14,color:i===0?"#f5d78e":"#e0d5c8"}}>{name}</div>
                      <div style={{display:"flex",gap:4,marginTop:2,alignItems:"center"}}>
                        {[sq.elite,sq.contender,sq.underdog].map(t=><span key={t.name} style={{fontSize:13}} title={t.name}>{t.flag}</span>)}
                        {adj!==0&&<span style={{fontSize:10,color:adj>0?"#95e17d":"#ff9999",marginLeft:4}}>{adj>0?`+${adj}`:adj} adj</span>}
                      </div>
                    </div>
                    <div style={{flex:2,minWidth:80}}>
                      <div style={{height:5,background:"rgba(255,255,255,0.08)",borderRadius:3,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${pct}%`,background:i===0?"linear-gradient(90deg,#c9a84c,#f5d78e)":"linear-gradient(90deg,#4ecdc4,#95e17d)",borderRadius:3,transition:"width 0.5s ease"}}/>
                      </div>
                    </div>
                    <div style={{fontSize:20,fontWeight:700,color:i===0?"#f5d78e":GOLD,minWidth:48,textAlign:"right"}}>
                      {cPts[name]||0}<span style={{fontSize:10,color:"#888",fontWeight:400}}> pts</span>
                    </div>
                  </div>
                );
              })}
            </div>
            {/* Points key */}
            <div style={{...card,marginTop:22}}>
              <div style={{color:GOLD,fontSize:11,fontWeight:700,marginBottom:9,letterSpacing:1,textTransform:"uppercase"}}>Points Key</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:4}}>
                {[["⚽","Group stage win",PTS.groupWin],["✅","Reach Round of 32",PTS.reachR32],["🥇","Top their group (after all 3 played)",PTS.groupTop],["🔥","Win Rd of 32",PTS.r32Win],["💥","Win Rd of 16",PTS.r16Win],["⭐","Reach QF",PTS.qfWin],["🌟","Reach SF",PTS.sfWin],["🏆","Reach Final",PTS.finalWin],["🎖️","Win the Cup",PTS.champion],["🎯","Score 5+ in match",PTS.fiveGoals],["🚀","Underdog beats Elite",PTS.underdogElite],["👟","Golden Boot team",PTS.goldenBoot]].map(([e,l,p])=>(
                  <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"4px 8px",background:"rgba(255,255,255,0.03)",borderRadius:5}}>
                    <span style={{fontSize:11,color:"#b0a080"}}>{e} {l}</span>
                    <span style={{fontSize:12,fontWeight:700,color:GOLD,minWidth:24,textAlign:"right"}}>+{p}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ── FIXTURES ── */}
        {tab==="fixtures"&&(
          <div>
            <div style={secTitle}>📅 Full Fixture Schedule <span style={{fontSize:13,color:"#888",fontWeight:400}}>· All times NZT (UTC+12)</span></div>

            {/* Qualifiers panel */}
            {(()=>{
              const completeGroups=Object.keys(GROUPS).filter(g=>
                GROUP_FIXTURES.filter(f=>f.group===g).every(f=>{
                  const sc=scores[f.id];return sc&&sc.home!=null&&sc.home!==""&&sc.away!=null&&sc.away!=="";
                })
              );
              if(completeGroups.length===0)return null;
              const thirds=completeGroups.map(g=>({g,team:rankings[g][2],s:standings[rankings[g][2]]}))
                .sort((a,b)=>b.s.pts-a.s.pts||b.s.gd-a.s.gd||b.s.gf-a.s.gf);
              const qualThirds=new Set(thirds.slice(0,8).map(t=>t.team));
              return(
                <div style={{...card,marginBottom:20,background:"rgba(201,168,76,0.04)"}}>
                  <div style={{color:GOLD,fontSize:12,fontWeight:700,marginBottom:10,letterSpacing:1,textTransform:"uppercase"}}>
                    ✅ Qualifiers ({completeGroups.length}/12 groups complete)
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:8}}>
                    {completeGroups.map(g=>(
                      <div key={g} style={{fontSize:11}}>
                        <div style={{color:"#888",fontSize:10,fontWeight:700,marginBottom:3}}>GROUP {g}</div>
                        <div style={{color:"#f5d78e",fontWeight:700}}>1. {FLAGS[rankings[g][0]]} {rankings[g][0]}</div>
                        <div style={{color:"#c9b890"}}>2. {FLAGS[rankings[g][1]]} {rankings[g][1]}</div>
                        <div style={{color:qualThirds.has(rankings[g][2])?"#95e17d":"#666"}}>3. {FLAGS[rankings[g][2]]} {rankings[g][2]} {qualThirds.has(rankings[g][2])?"✓":"✗"}</div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}

            <div style={{display:"flex",flexDirection:"column",gap:3}}>
              {FIXTURES_NZT.map((day,di)=>(
                <div key={di}>
                  <div style={{color:GOLD,fontSize:12,fontWeight:700,letterSpacing:2,textTransform:"uppercase",padding:"12px 0 6px",borderBottom:"1px solid rgba(201,168,76,0.15)",marginBottom:4}}>
                    {day.date}
                  </div>
                  {day.matches.map((m,mi)=>{
                    const gf=GROUP_FIXTURES.find(f=>(f.home===m.home&&f.away===m.away)||(f.home===m.away&&f.away===m.home));
                    const flipped=gf&&gf.home!==m.home;
                    const rawSc=gf?scores[gf.id]:null;
                    const sc=rawSc&&flipped?{home:rawSc.away,away:rawSc.home}:rawSc;
                    const hg=sc?.home!=null&&sc?.home!==""?parseInt(sc.home):null;
                    const ag=sc?.away!=null&&sc?.away!==""?parseInt(sc.away):null;
                    const played=hg!==null&&ag!==null&&!isNaN(hg)&&!isNaN(ag);
                    const involved=drawn&&assignments?names.some(n=>{
                      const sq=assignments[n];
                      return sq&&[sq.elite.name,sq.contender.name,sq.underdog.name].some(t=>t===m.home||t===m.away);
                    }):false;
                    const isKo=["R32","R16","QF","SF","3P","FIN","—"].includes(m.group);
                    return(
                      <div key={mi} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderRadius:7,marginBottom:2,background:involved?"rgba(201,168,76,0.06)":"rgba(255,255,255,0.02)",border:`1px solid ${involved?"rgba(201,168,76,0.2)":"rgba(255,255,255,0.04)"}`}}>
                        <span style={{fontSize:11,color:GOLD,minWidth:50,fontWeight:700}}>{m.time}</span>
                        <span style={{fontSize:10,color:"#555",minWidth:22,textAlign:"center"}}>{isKo?"":m.group}</span>
                        <div style={{flex:1,display:"flex",alignItems:"center",gap:6,justifyContent:"flex-end"}}>
                          {isKo?(
                            <span style={{fontSize:12,color:"#666",fontStyle:"italic"}}>{m.home} {m.away}</span>
                          ):(
                            <>
                              <span style={{fontSize:12,color:played&&hg>ag?"#f5d78e":"#a89070",fontWeight:played&&hg>ag?700:400,textAlign:"right",minWidth:95}}>{FLAGS[m.home]||""} {m.home}</span>
                              {played
                                ?<span style={{fontSize:13,fontWeight:700,color:"#f5d78e",minWidth:36,textAlign:"center"}}>{hg}–{ag}</span>
                                :<span style={{fontSize:11,color:"#444",minWidth:36,textAlign:"center"}}>vs</span>
                              }
                              <span style={{fontSize:12,color:played&&ag>hg?"#f5d78e":"#a89070",fontWeight:played&&ag>hg?700:400,minWidth:95}}>{m.away} {FLAGS[m.away]||""}</span>
                            </>
                          )}
                        </div>
                        {involved&&<span style={{fontSize:9,color:GOLD,minWidth:14}} title="Sweepstake interest">★</span>}
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          </div>
        )}

      </div>

      <div style={{textAlign:"center",padding:"14px",borderTop:"1px solid rgba(201,168,76,0.07)",color:"#3a3020",fontSize:11,marginTop:10}}>
        FIFA World Cup 2026 · June 11–July 19 · USA, Canada &amp; Mexico · 48 Teams · 104 Matches
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
